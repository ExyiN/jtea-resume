<p-panel>
  <ng-template #header>
    <p class="md:text-4xl text-3xl font-bold text-primary">Compétences techniques</p>
  </ng-template>
  <div class="grid lg:grid-cols-6 grid-cols-2 gap-4">
    <div class="col-span-2 grid grid-cols-subgrid grid-flow-col grid-rows-4 gap-y-1">
      <p class="col-span-2 font-semibold">Front-end</p>
      <p>Angular</p>
      <p>TypeScript</p>
      <p>HTML5, CSS3</p>
    </div>
    <div class="col-span-2 grid grid-cols-subgrid grid-flow-col grid-rows-4 gap-y-1">
      <p class="col-span-2 font-semibold">Back-end</p>
      <p>Java</p>
      <p>Spring Boot</p>
      <p>API REST</p>
    </div>
    <div class="col-span-2 grid grid-cols-subgrid grid-flow-col grid-rows-4 gap-y-1">
      <p class="col-span-2 font-semibold">Autres</p>
      <p>Git, Github</p>
      <p>Docker</p>
      <p>Agile Scrum</p>
    </div>
  </div>
</p-panel>
