<p-panel class="h-full">
  <ng-template #header>
    <p class="md:text-4xl text-3xl font-bold text-primary">{{ 'languages.header' | translate }}</p>
  </ng-template>
  <div class="grid grid-flow-col grid-rows-4 gap-1">
    @for (language of getLanguages() | async; track $index) {
      <p>{{ language }}</p>
    }
  </div>
</p-panel>
