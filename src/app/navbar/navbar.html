<p-menubar [model]="items" breakpoint="48rem">
  <ng-template #item let-item>
    <a
      pRipple
      class="flex items-center gap-4 p-3 rounded-2xl"
      pTooltip="{{ 'navbar.items.labels.' + item.id | translate }}"
      tooltipPosition="bottom"
      [pTooltipPT]="tooltipPT"
    >
      <i [class]="item.icon"></i>
      <span class="md:hidden">{{ 'navbar.items.labels.' + item.id | translate }}</span>
    </a>
  </ng-template>
  <ng-template #end>
    <app-toggle-theme-button />
  </ng-template>
</p-menubar>
